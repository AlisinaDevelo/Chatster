name: Bug report
description: Something is broken or incorrect
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks — include enough detail to reproduce the issue.
  - type: textarea
    id: what
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Go version, Node version, Docker if used
    validations:
      required: false
